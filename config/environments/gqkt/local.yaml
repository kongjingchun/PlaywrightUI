# ========================================
# 本地环境配置文件
# ========================================
# 用于本地开发调试，通常指向 localhost
# 使用方法：ENV=local pytest tests/
# ========================================

# 基础 URL - 本地服务地址（需包含协议，如 http://）
base_url: "http://192.168.200.204:5173"


# 初始管理员用户信息
# initial_admin:
#   username: "orgadmin"
#   password: "j=zCD7NtiL"

initial_admin:
  username: "superadmin"
  password: "111"

# 测试数据文件路径（相对于 data/ 目录）
gqkt_config_file: "gqkt/local_config.yaml"

# API 配置
api:
  base_url: "http://localhost:8080"
  timeout: 30000
  api_key: ""

# MySQL 数据库配置
mysql:
  enabled: false
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: "local_db"
  charset: "utf8mb4"

# Redis 配置
redis:
  enabled: false
  host: "127.0.0.1"
  port: 6379
  db: 0
  password: ""

# 特性开关
features:
  debug_mode: true
  mock_api: false
  verbose_logging: true

# 钉钉通知配置
dingtalk:
  enabled: false
  webhook: ""
  secret: ""
